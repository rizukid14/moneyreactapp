<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoneyApp</title>
</head>

<body>
  <div id="root">
    <!-- Inline splash screen: shown instantly before React hydrates -->
    <div id="splash" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f8f9fb;z-index:99999">
      <script>
        // Apply cached theme instantly to prevent flash
        try{if(localStorage.getItem('moneyapp-theme')==='dark')document.getElementById('splash').style.background='#0f172a'}catch(e){}
      </script>
      <style>
        @keyframes sp-pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.08);opacity:.85}}
        @keyframes sp-fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes sp-shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
        @keyframes sp-dots{0%,80%,100%{opacity:0}40%{opacity:1}}
        #splash .sp-logo{animation:sp-pulse 2s ease-in-out infinite}
        #splash .sp-title{animation:sp-fade .6s ease-out .2s both}
        #splash .sp-dot{animation:sp-dots 1.4s ease-in-out infinite}
      </style>
      <div class="sp-logo" style="margin-bottom:24px">
        <div style="width:88px;height:88px;border-radius:24px;background:linear-gradient(135deg,#F59E0B,#D97706);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 32px rgba(245,158,11,.18),0 0 64px rgba(245,158,11,.08)">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="56" height="56">
            <ellipse cx="24" cy="26" rx="16" ry="14" fill="rgba(255,255,255,.95)"/>
            <ellipse cx="36" cy="27" rx="5" ry="4" fill="rgba(255,255,255,.7)"/>
            <circle cx="35" cy="26" r="1" fill="#D97706"/><circle cx="38" cy="26" r="1" fill="#D97706"/>
            <circle cx="30" cy="21" r="2.5" fill="white"/><circle cx="30.5" cy="20.5" r="1.2" fill="#1E293B"/><circle cx="31" cy="20" r=".4" fill="white"/>
            <ellipse cx="17" cy="14" rx="4" ry="5" fill="rgba(255,255,255,.95)" transform="rotate(-20 17 14)"/>
            <ellipse cx="27" cy="13" rx="4" ry="5" fill="rgba(255,255,255,.95)" transform="rotate(10 27 13)"/>
            <rect x="20" y="12" width="6" height="2" rx="1" fill="#D97706"/>
            <rect x="13" y="36" width="4" height="5" rx="2" fill="rgba(255,255,255,.95)"/>
            <rect x="29" y="36" width="4" height="5" rx="2" fill="rgba(255,255,255,.95)"/>
          </svg>
        </div>
      </div>
      <div class="sp-title" style="font-family:system-ui,-apple-system,sans-serif;font-size:28px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,#FBBF24,#F59E0B,#D97706);background-size:200% auto;animation:sp-shimmer 3s linear infinite,sp-fade .6s ease-out .2s both;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">MoneyApp</div>
      <div style="display:flex;gap:6px;margin-top:32px;animation:sp-fade .6s ease-out .5s both">
        <div class="sp-dot" style="width:6px;height:6px;border-radius:50%;background:#F59E0B;animation-delay:0s"></div>
        <div class="sp-dot" style="width:6px;height:6px;border-radius:50%;background:#F59E0B;animation-delay:.2s"></div>
        <div class="sp-dot" style="width:6px;height:6px;border-radius:50%;background:#F59E0B;animation-delay:.4s"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
