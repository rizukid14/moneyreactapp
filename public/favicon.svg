<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Piggy bank body -->
  <ellipse cx="24" cy="26" rx="16" ry="14" fill="#F59E0B"/>
  <ellipse cx="24" cy="26" rx="16" ry="14" fill="url(#bodyGrad)"/>
  
  <!-- Snout -->
  <ellipse cx="36" cy="27" rx="5" ry="4" fill="#FB923C"/>
  <circle cx="35" cy="26" r="1" fill="#D97706"/>
  <circle cx="38" cy="26" r="1" fill="#D97706"/>
  
  <!-- Eye -->
  <circle cx="30" cy="21" r="2.5" fill="white"/>
  <circle cx="30.5" cy="20.5" r="1.2" fill="#1E293B"/>
  <circle cx="31" cy="20" r="0.4" fill="white"/>
  
  <!-- Ears -->
  <ellipse cx="17" cy="14" rx="4" ry="5" fill="#F59E0B" transform="rotate(-20 17 14)"/>
  <ellipse cx="17" cy="14" rx="2.5" ry="3.5" fill="#FB923C" transform="rotate(-20 17 14)"/>
  <ellipse cx="27" cy="13" rx="4" ry="5" fill="#F59E0B" transform="rotate(10 27 13)"/>
  <ellipse cx="27" cy="13" rx="2.5" ry="3.5" fill="#FB923C" transform="rotate(10 27 13)"/>
  
  <!-- Coin slot -->
  <rect x="20" y="12" width="6" height="2" rx="1" fill="#D97706"/>
  
  <!-- Legs -->
  <rect x="13" y="36" width="4" height="5" rx="2" fill="#F59E0B"/>
  <rect x="29" y="36" width="4" height="5" rx="2" fill="#F59E0B"/>
  
  <!-- Tail -->
  <path d="M8 24 Q4 22 5 18 Q6 15 8 17" stroke="#F59E0B" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Cheek blush -->
  <ellipse cx="28" cy="29" rx="3" ry="2" fill="#FBBF24" opacity="0.5"/>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="bodyGrad" x1="8" y1="14" x2="40" y2="40">
      <stop offset="0%" stop-color="#FBBF24" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#D97706" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
</svg>